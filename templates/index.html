{% extends "base.html" %}

{% block content_public %}
<div class="container">
    <div class="row min-vh-100 align-items-center">
        <div class="col-md-6 mx-auto text-center">
            <div class="card">
                <div class="card-body p-5">
                    <i class="fas fa-hospital-user fa-5x text-primary mb-4"></i>
                    <h1 class="display-4 mb-4">Gestion des Patients</h1>
                    <p class="lead mb-4">Plateforme complète de gestion médicale pour les structures de santé</p>
                    <div class="d-grid gap-3">
                        <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i> Connexion
                        </a>
                        <a href="{{ url_for('register_structure') }}" class="btn btn-outline-secondary btn-lg">
                            <i class="fas fa-building me-2"></i> Inscription structure
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
