{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>
            <i class="fas fa-plus-circle me-2"></i>
            Nouvelle Hospitalisation
        </h1>
        <a href="{{ url_for('liste_hospitalisations') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i>Retour
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <!-- Patient -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Patient *</label>
                        <select name="patient_id" class="form-select" required>
                            <option value="">Sélectionnez un patient</option>
                            {% for patient in patients %}
                            <option value="{{ patient.id }}">
                                {{ patient.nom }} {{ patient.prenom }} - {{ patient.date_naissance.strftime('%d/%m/%Y') if patient.date_naissance else '-' }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Service -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Service *</label>
                        <select name="service" id="serviceSelect" class="form-select" required>
                            <option value="">Sélectionnez un service</option>
                            {% for service in services %}
                            <option value="{{ service.nom }}">{{ service.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Motif -->
                <div class="row">
                    <div class="col-12 mb-3">
                        <label class="form-label">Motif d'hospitalisation *</label>
                        <textarea name="motif" class="form-control" rows="3" placeholder="Raison de l'hospitalisation..." required></textarea>
                    </div>
                </div>

                <!-- Salle et Lit -->
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Salle</label>
                        <select name="salle_id" id="salleSelect" class="form-select">
                            <option value="">Sélectionnez d'abord un service</option>
                        </select>
                        <small class="text-muted">Choisissez une salle disponible</small>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Lit</label>
                        <select name="lit_id" id="litSelect" class="form-select">
                            <option value="">Sélectionnez d'abord une salle</option>
                        </select>
                        <small class="text-muted">Choisissez un lit disponible</small>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Chambre (manuel)</label>
                        <input type="text" name="chambre" class="form-control" placeholder="Ex: 301">
                        <small class="text-muted">Laisser vide si un lit est sélectionné</small>
                    </div>
                </div>

                <!-- Médecins et Infirmiers -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Médecins référents</label>
                        <select name="medecins_ids" class="form-select" multiple>
                            {% for medecin in medecins %}
                            <option value="{{ medecin.id }}">
                                Dr {{ medecin.prenom }} {{ medecin.nom }}
                            </option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Maintenez Ctrl pour sélectionner plusieurs</small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Infirmiers assignés</label>
                        <select name="infirmiers_ids" class="form-select" multiple>
                            {% for infirmier in infirmiers %}
                            <option value="{{ infirmier.id }}">
                                {{ infirmier.prenom }} {{ infirmier.nom }}
                            </option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Maintenez Ctrl pour sélectionner plusieurs</small>
                    </div>
                </div>

                <!-- Notes -->
                <div class="row">
                    <div class="col-12 mb-3">
                        <label class="form-label">Notes d'admission</label>
                        <textarea name="notes_admission" class="form-control" rows="3" placeholder="Informations complémentaires..."></textarea>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <button type="reset" class="btn btn-secondary me-md-2">
                        <i class="fas fa-undo me-2"></i>Réinitialiser
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Admettre le patient
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const serviceSelect = document.getElementById('serviceSelect');
    const salleSelect = document.getElementById('salleSelect');
    const litSelect = document.getElementById('litSelect');
    
    // Charger les salles quand un service est sélectionné
    serviceSelect.addEventListener('change', function() {
        const serviceNom = this.value;
        salleSelect.innerHTML = '<option value="">Chargement...</option>';
        litSelect.innerHTML = '<option value="">Sélectionnez d\'abord une salle</option>';
        
        if (serviceNom) {
            fetch(`/api/salles/disponibles?service=${encodeURIComponent(serviceNom)}`)
                .then(response => response.json())
                .then(data => {
                    salleSelect.innerHTML = '<option value="">Sélectionnez une salle</option>';
                    data.forEach(salle => {
                        const option = document.createElement('option');
                        option.value = salle.id;
                        option.textContent = `${salle.nom} (${salle.type}) - ${salle.lits_disponibles} lit(s) disponible(s)`;
                        salleSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    salleSelect.innerHTML = '<option value="">Erreur de chargement</option>';
                });
        } else {
            salleSelect.innerHTML = '<option value="">Sélectionnez d\'abord un service</option>';
        }
    });
    
    // Charger les lits quand une salle est sélectionnée
    salleSelect.addEventListener('change', function() {
        const salleId = this.value;
        litSelect.innerHTML = '<option value="">Chargement...</option>';
        
        if (salleId) {
            fetch(`/api/lits/disponibles?salle_id=${salleId}`)
                .then(response => response.json())
                .then(data => {
                    litSelect.innerHTML = '<option value="">Sélectionnez un lit</option>';
                    data.forEach(lit => {
                        const option = document.createElement('option');
                        option.value = lit.id;
                        option.textContent = `Lit ${lit.numero}`;
                        litSelect.appendChild(option);
                    });
                    if (data.length === 0) {
                        litSelect.innerHTML = '<option value="">Aucun lit disponible dans cette salle</option>';
                    }
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    litSelect.innerHTML = '<option value="">Erreur de chargement</option>';
                });
        } else {
            litSelect.innerHTML = '<option value="">Sélectionnez d\'abord une salle</option>';
        }
    });
});
</script>
{% endblock %}
