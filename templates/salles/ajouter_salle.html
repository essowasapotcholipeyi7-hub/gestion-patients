{% extends "base.html" %}

{% block title %}Nouvelle salle{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-bed me-2 text-success"></i>Nouvelle salle</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Service *</label>
                            <select name="service_id" class="form-select" required>
                                <option value="">Sélectionner un service</option>
                                {% for service in services %}
                                <option value="{{ service.id }}">{{ service.nom }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nom de la salle *</label>
                                <input type="text" name="nom" class="form-control" required placeholder="Ex: VIP-101">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Type de salle *</label>
                                <select name="type_salle" class="form-select" required>
                                    <option value="">Sélectionner</option>
                                    <option value="VIP">VIP</option>
                                    <option value="Standard">Standard</option>
                                    <option value="Soins intensifs">Soins intensifs</option>
                                    <option value="Réanimation">Réanimation</option>
                                    <option value="Isolation">Isolation</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre de lits *</label>
                                <input type="number" name="nombre_lits" class="form-control" required min="1" max="10" value="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Prix journalier (CFA)</label>
                                <input type="number" name="prix_journalier" class="form-control" placeholder="25000">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="2" placeholder="Description de la salle..."></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('liste_salles') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Annuler
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save me-2"></i>Créer la salle
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
