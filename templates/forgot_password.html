{% extends "base.html" %}

{% block content_public %}
<div class="container">
    <div class="row min-vh-100 align-items-center">
        <div class="col-md-4 mx-auto">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-key fa-4x text-warning"></i>
                        <h3 class="mt-3">Mot de passe oublié</h3>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" name="use_secret_question" class="form-check-input" id="useSecret">
                            <label class="form-check-label" for="useSecret">
                                Utiliser ma question secrète
                            </label>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="fas fa-paper-plane me-2"></i> Réinitialiser
                            </button>
                        </div>
                        
                        <div class="text-center mt-3">
                            <a href="{{ url_for('login') }}" class="text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i> Retour à la connexion
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
