{% extends "base.html" %}

{% block title %}Admin - Réinitialiser mot de passe{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Réinitialiser le mot de passe</h5>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <strong>Structure :</strong> {{ structure.nom }}<br>
                        <strong>Email admin :</strong> {{ admin.email }}
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nouveau mot de passe</label>
                            <input type="password" name="new_password" class="form-control" required>
                            <small class="text-muted">Minimum 8 caractères, 1 majuscule, 1 minuscule, 1 chiffre, 1 symbole</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmer</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i> Réinitialiser
                        </button>
                        <a href="{{ url_for('admin_structures') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i> Retour
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
