{% extends "base.html" %}

{% block title %}Ajouter un patient{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">
            <i class="fas fa-user-plus me-2"></i>
            Nouveau patient
        </h1>
        <a href="{{ url_for('patients_list') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i>Retour
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <!-- Identité -->
                    <div class="col-md-12 mb-3">
                        <h5><i class="fas fa-id-card me-2"></i>Identité</h5>
                        <hr>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nom *</label>
                        <input type="text" name="nom" class="form-control" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Prénom *</label>
                        <input type="text" name="prenom" class="form-control" required>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Date de naissance</label>
                        <input type="date" name="date_naissance" class="form-control">
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Téléphone</label>
                        <input type="tel" name="telephone" class="form-control">
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Adresse</label>
                        <textarea name="adresse" class="form-control" rows="2"></textarea>
                    </div>
                    
                    <!-- Assurance -->
                    <div class="col-md-12 mb-3">
                        <h5><i class="fas fa-shield-alt me-2"></i>Assurance</h5>
                        <hr>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Type d'assurance</label>
                        <select name="type_assurance" class="form-select" id="typeAssurance">
                            <option value="">Sélectionner</option>
                            <option value="AMU-CNSS">AMU-CNSS</option>
                            <option value="AMU-INAM">AMU-INAM</option>
                            <option value="AUTRE_ASSURANCE">Autre assurance</option>
                            <option value="NON_ASSURÉ">Non assuré</option>
                        </select>
                    </div>
                    
                    <div class="col-md-4 mb-3" id="autreAssuranceDiv" style="display: none;">
                        <label class="form-label">Nom de l'assurance</label>
                        <input type="text" name="autre_assurance_nom" class="form-control" placeholder="Ex: Allianz, AXA...">
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Numéro d'assuré</label>
                        <input type="text" name="num_assure" class="form-control">
                    </div>
                    
                    <!-- Médecin référent -->
                    <div class="col-md-12 mb-3">
                        <h5><i class="fas fa-user-md me-2"></i>Médecin référent</h5>
                        <hr>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Médecin traitant</label>
                        <select name="id_medecin_referent" class="form-select">
                            <option value="">Sélectionner un médecin</option>
                            {% for medecin in medecins %}
                            <option value="{{ medecin.id }}">Dr {{ medecin.prenom }} {{ medecin.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Antécédents médicaux -->
                    <div class="col-md-12 mb-3">
                        <h5><i class="fas fa-notes-medical me-2"></i>Antécédents médicaux</h5>
                        <hr>
                    </div>
                    
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Allergies</label>
                        <textarea name="allergies" class="form-control" rows="2" placeholder="Ex: Pénicilline, Arachides..."></textarea>
                    </div>
                    
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Antécédents</label>
                        <textarea name="antecedents" class="form-control" rows="2" placeholder="Ex: Hypertension, Diabète..."></textarea>
                    </div>
                    
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('typeAssurance').addEventListener('change', function() {
        var autreDiv = document.getElementById('autreAssuranceDiv');
        if (this.value === 'AUTRE_ASSURANCE') {
            autreDiv.style.display = 'block';
        } else {
            autreDiv.style.display = 'none';
        }
    });
</script>
{% endblock %}
