{% extends "base.html" %}

{% block title %}Ajouter un patient{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">
            <i class="fas fa-user-plus me-2"></i>
            Nouveau patient
        </h1>
        <a href="{{ url_for('patients_list') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i>Retour
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <!-- Identité -->
                    <div class="col-md-12 mb-3">
                        <h5><i class="fas fa-id-card me-2"></i>Identité</h5>
                        <hr>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nom *</label>
                        <input type="text" name="nom" class="form-control" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Prénom *</label>
                        <input type="text" name="prenom" class="form-control" required>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Date de naissance</label>
                        <input type="date" name="date_naissance" class="form-control">
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Sexe</label>
                        <select name="sexe" class="form-select">
                            <option value="">Sélectionner</option>
                            <option value="M">Masculin</option>
                            <option value="F">Féminin</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Téléphone</label>
                        <input type="tel" name="telephone" class="form-control">
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Profession</label>
                        <input type="text" name="profession" class="form-control" placeholder="Ex: Enseignant, Commerçant...">
                    </div>
                    
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Adresse</label>
                        <textarea name="adresse" class="form-control" rows="2"></textarea>
                    </div>
                    
                    <!-- Assurance -->
                    <div class="col-md-12 mb-3">
                        <h5><i class="fas fa-shield-alt me-2"></i>Assurance</h5>
                        <hr>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Type d'assurance</label>
                        <select name="type_assurance" class="form-select" id="typeAssurance">
                            <option value="">Sélectionner</option>
                            <option value="AMU-CNSS">AMU-CNSS</option>
                            <option value="AMU-INAM">AMU-INAM</option>
                            <option value="AUTRE_ASSURANCE">Autre assurance</option>
                            <option value="NON_ASSURÉ">Non assuré</option>
                        </select>
                    </div>
                    
                    <div class="col-md-4 mb-3" id="autreAssuranceDiv" style="display: none;">
                        <label class="form-label">Nom de l'assurance</label>
                        <input type="text" name="autre_assurance_nom" class="form-control" placeholder="Ex: Allianz, AXA...">
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Numéro d'assuré</label>
                        <input type="text" name="num_assure" class="form-control">
                    </div>
                    
                    <!-- ⭐ CONSTANTES VITALES (NOUVEAU) -->
                    <div class="col-md-12 mb-3">
                        <h5><i class="fas fa-heartbeat me-2 text-danger"></i>Constantes vitales</h5>
                        <hr>
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Température (°C)</label>
                        <input type="number" step="0.1" name="temperature" class="form-control" placeholder="37.5">
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Tension artérielle</label>
                        <input type="text" name="tension" class="form-control" placeholder="120/80">
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Pouls (bpm)</label>
                        <input type="number" name="pouls" class="form-control" placeholder="72">
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Saturation O₂ (%)</label>
                        <input type="number" name="saturation" class="form-control" placeholder="98">
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Poids (kg)</label>
                        <input type="number" step="0.1" name="poids" class="form-control" id="poids" placeholder="75">
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Taille (cm)</label>
                        <input type="number" step="0.5" name="taille" class="form-control" id="taille" placeholder="175">
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <label class="form-label">IMC</label>
                        <input type="number" step="0.1" name="imc" class="form-control" id="imc" readonly style="background-color: #e9ecef;">
                    </div>
                    
                    <!-- ⚠️ ANTÉCÉDENTS SUPPRIMÉS (déplacés vers Consultation) -->
                    
                    <!-- Médecin référent -->
                    <div class="col-md-12 mb-3">
                        <h5><i class="fas fa-user-md me-2"></i>Médecin référent</h5>
                        <hr>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Médecin traitant</label>
                        <select name="id_medecin_referent" class="form-select">
                            <option value="">Sélectionner un médecin</option>
                            {% for medecin in medecins %}
                            <option value="{{ medecin.id }}">Dr {{ medecin.prenom }} {{ medecin.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-12 mb-3">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            <strong>Note :</strong> Les antécédents médicaux, allergies et traitements en cours seront renseignés lors des consultations.
                        </div>
                    </div>
                </div>
                
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Affichage du champ "Autre assurance"
    document.getElementById('typeAssurance').addEventListener('change', function() {
        var autreDiv = document.getElementById('autreAssuranceDiv');
        if (this.value === 'AUTRE_ASSURANCE') {
            autreDiv.style.display = 'block';
        } else {
            autreDiv.style.display = 'none';
        }
    });
    
    // Calcul automatique de l'IMC
    const poids = document.getElementById('poids');
    const taille = document.getElementById('taille');
    const imcField = document.getElementById('imc');
    
    function calculerIMC() {
        let p = parseFloat(poids.value);
        let t = parseFloat(taille.value);
        
        if (p && t && t > 0) {
            let tailleM = t / 100;
            let imc = p / (tailleM * tailleM);
            imcField.value = imc.toFixed(1);
        } else {
            imcField.value = '';
        }
    }
    
    poids.addEventListener('input', calculerIMC);
    taille.addEventListener('input', calculerIMC);
</script>
{% endblock %}
